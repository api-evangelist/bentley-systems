specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Bentley Systems
providerId: bentley-systems
created: '2026-05-23'
modified: '2026-05-23'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Digital Twin
  - iTwin
description: >-
  FOCUS-aligned FinOps profile for Bentley's iTwin Platform. Billing is a subscription fee per
  tier (Community/Standard/Premium/Enterprise) plus metered credit consumption across iTwin
  services. Reality data, iModel ingress/egress, storage, visualization-hours, and reporting rows
  are the primary cost drivers.
sources:
  - https://developer.bentley.com/pricing/
  - https://www.bentley.com/legal/

alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/

publisherName: Bentley Systems, Incorporated
serviceCategory: Engineering Software / Digital Twin Platform

billingModel:
  pricingCategory: Subscription + Metered Credit Consumption
  billingFrequency: Monthly (subscription); Continuous metering (credits)
  billingCurrency: USD (others available via Enterprise contracts)
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Credit
    - Refund

focusColumns:
  ServiceName: iTwin Platform
  ServiceCategory: Engineering Software
  ProviderName: Bentley Systems
  PublisherName: Bentley Systems, Incorporated
  InvoiceIssuerName: Bentley Systems, Incorporated
  BillingCurrency: USD

meters:
  - name: itwin_credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - subscription_id
      - itwin_id
      - service
      - operation
    description: Aggregate credit consumption across all iTwin Platform services.

  - name: imodel_data_transferred
    unit: gigabyte
    aggregation: sum
    dimensions:
      - subscription_id
      - itwin_id
      - imodel_id
      - direction
    description: iModel ingress and egress (1 credit per 2 GB).

  - name: cloud_storage_used
    unit: gigabyte-month
    aggregation: average
    dimensions:
      - subscription_id
      - itwin_id
      - storage_class
    description: Cloud data storage (1 credit per 2 GB stored per month).

  - name: reality_storage_used
    unit: gigabyte-month
    aggregation: average
    dimensions:
      - subscription_id
      - itwin_id
      - reality_data_type
    description: Reality data storage included up to tier allowance; overage in credits.

  - name: visualization_access_hours
    unit: hour
    aggregation: sum
    dimensions:
      - subscription_id
      - itwin_id
      - imodel_id
      - user_id
    description: Visualization service consumption (1 credit per access hour).

  - name: reporting_rows_processed
    unit: rows
    aggregation: sum
    dimensions:
      - subscription_id
      - report_id
      - mapping_id
    description: Insights API processed rows (1 credit per 250,000 rows).

  - name: reality_modeling_jobs
    unit: job
    aggregation: sum
    dimensions:
      - subscription_id
      - itwin_id
      - output_format
    description: Reality Modeling (ContextCapture) jobs; up to 6 credits per unit depending on output and scale.

  - name: synchronization_runs
    unit: run
    aggregation: count
    dimensions:
      - subscription_id
      - itwin_id
      - imodel_id
      - connector
    description: Connector-based synchronization runs from source repositories into iModels.

  - name: reality_analysis_jobs
    unit: job
    aggregation: sum
    dimensions:
      - subscription_id
      - detector_id
      - itwin_id
    description: AI-powered Reality Analysis job consumption.

  - name: pnid_extraction_jobs
    unit: job
    aggregation: sum
    dimensions:
      - subscription_id
      - itwin_id
    description: P&ID-to-iTwin AI extraction jobs.

allocation:
  strategies:
    - name: Per-iTwin allocation
      basis: iTwin id tag
      description: >-
        Tag iTwins with cost-center, project-code, or business-unit identifiers and allocate
        credits accordingly.
    - name: Per-iModel allocation
      basis: iModel id
      description: >-
        Allocate storage, ingress/egress, and visualization-hours to the owning iModel and roll
        up to project / endeavor.
    - name: Per-Service allocation
      basis: API namespace
      description: >-
        Roll up credit consumption per service (iModels, Storage, Visualization, Reporting,
        Reality Modeling) for cost transparency.

forecasting:
  drivers:
    - User adoption of Visualization API (per-hour credits)
    - Volume of synchronized native files (ingress credits)
    - Reality data ingest cadence and storage
    - Reporting cadence and dataset size
    - Reality Modeling job complexity

optimization:
  recommendations:
    - name: Cache Visualization sessions
      description: Avoid re-streaming the same iModel state; reuse Saved Views and cached scenes.
    - name: Batch reporting
      description: Aggregate report runs and avoid sub-million row reruns that recharge credits.
    - name: Reality data tiering
      description: Move infrequently accessed reality data to lower-cost tiers or archive externally.
    - name: Right-size subscriptions
      description: >-
        Compare monthly overage against next-tier subscription costs (Standard $199 → Premium
        $499) and right-size proactively.
    - name: Test in Community tier
      description: Develop and validate flows on the free Community tier before promoting to Standard/Premium.

openapi: 3.1.0
info:
  title: iTwin Control Access Reality Data API
  description: Role-based access control for iTwins — permissions, roles, group membership, owner members, invitations, shares, and job-based access.
  version: '1.0'
  contact:
    name: Bentley Developer Relations
    url: https://developer.bentley.com/apis/access-control/
  license:
    name: Bentley Developer Portal Terms
    url: https://developer.bentley.com/legal/
servers:
- url: https://api.bentley.com/accesscontrol
  description: iTwin Platform Production
security:
- OAuth2: []
tags:
- name: Reality Data
  description: Reality Data resources for the iTwin Reality Management API.
paths:
  /reality-data:
    get:
      tags:
      - Reality Data
      summary: Get Reality Data
      operationId: GetRealityData
      responses:
        '200':
          description: List of Reality Data
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
      - Reality Data
      summary: Create Reality Data
      operationId: CreateRealityData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Reality Data created
          content:
            application/json:
              schema:
                type: object
  /reality-data/{realityDataId}:
    parameters:
    - name: realityDataId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Reality Data
      summary: Get Reality Data
      operationId: GetRealityData
      responses:
        '200':
          description: List of Reality Data
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
      - Reality Data
      summary: Update Reality Data
      operationId: UpdateRealityData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Reality Data updated
    delete:
      tags:
      - Reality Data
      summary: Delete Reality Data
      operationId: DeleteRealityData
      responses:
        '204':
          description: Reality Data deleted
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: iTwin Platform OAuth2 — Bentley IMS
      flows:
        authorizationCode:
          authorizationUrl: https://ims.bentley.com/connect/authorize
          tokenUrl: https://ims.bentley.com/connect/token
          scopes:
            itwin-platform: Full access to iTwin Platform APIs
externalDocs:
  description: iTwin Access Control API Documentation
  url: https://developer.bentley.com/apis/access-control/

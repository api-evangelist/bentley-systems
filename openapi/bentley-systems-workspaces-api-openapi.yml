openapi: 3.1.0
info:
  title: iTwin Control Access Workspaces API
  description: Role-based access control for iTwins — permissions, roles, group membership, owner members, invitations, shares, and job-based access.
  version: '1.0'
  contact:
    name: Bentley Developer Relations
    url: https://developer.bentley.com/apis/access-control/
  license:
    name: Bentley Developer Portal Terms
    url: https://developer.bentley.com/legal/
servers:
- url: https://api.bentley.com/accesscontrol
  description: iTwin Platform Production
security:
- OAuth2: []
tags:
- name: Workspaces
  description: Workspaces resources for the iTwin Reality Modeling API.
paths:
  /workspaces:
    get:
      tags:
      - Workspaces
      summary: Get Workspaces
      operationId: GetWorkspaces
      responses:
        '200':
          description: List of Workspaces
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
      - Workspaces
      summary: Create Workspace
      operationId: CreateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                type: object
  /workspaces/{workspaceId}:
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Workspaces
      summary: Get Workspaces
      operationId: GetWorkspaces
      responses:
        '200':
          description: List of Workspaces
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
      - Workspaces
      summary: Update Workspace
      operationId: UpdateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Workspace updated
    delete:
      tags:
      - Workspaces
      summary: Delete Workspace
      operationId: DeleteWorkspace
      responses:
        '204':
          description: Workspace deleted
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: iTwin Platform OAuth2 — Bentley IMS
      flows:
        authorizationCode:
          authorizationUrl: https://ims.bentley.com/connect/authorize
          tokenUrl: https://ims.bentley.com/connect/token
          scopes:
            itwin-platform: Full access to iTwin Platform APIs
externalDocs:
  description: iTwin Access Control API Documentation
  url: https://developer.bentley.com/apis/access-control/

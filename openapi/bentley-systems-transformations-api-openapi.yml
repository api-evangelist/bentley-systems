openapi: 3.1.0
info:
  title: iTwin Control Access Transformations API
  description: Role-based access control for iTwins — permissions, roles, group membership, owner members, invitations, shares, and job-based access.
  version: '1.0'
  contact:
    name: Bentley Developer Relations
    url: https://developer.bentley.com/apis/access-control/
  license:
    name: Bentley Developer Portal Terms
    url: https://developer.bentley.com/legal/
servers:
- url: https://api.bentley.com/accesscontrol
  description: iTwin Platform Production
security:
- OAuth2: []
tags:
- name: Transformations
  description: Transformations resources for the iTwin Transformations API.
paths:
  /:
    get:
      tags:
      - Transformations
      summary: Get Transformations
      operationId: GetTransformations
      responses:
        '200':
          description: List of Transformations
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
      - Transformations
      summary: Create Transformation
      operationId: CreateTransformation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Transformation created
          content:
            application/json:
              schema:
                type: object
  /{transformationId}:
    parameters:
    - name: transformationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Transformations
      summary: Get Transformations
      operationId: GetTransformations
      responses:
        '200':
          description: List of Transformations
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
      - Transformations
      summary: Update Transformation
      operationId: UpdateTransformation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Transformation updated
    delete:
      tags:
      - Transformations
      summary: Delete Transformation
      operationId: DeleteTransformation
      responses:
        '204':
          description: Transformation deleted
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: iTwin Platform OAuth2 — Bentley IMS
      flows:
        authorizationCode:
          authorizationUrl: https://ims.bentley.com/connect/authorize
          tokenUrl: https://ims.bentley.com/connect/token
          scopes:
            itwin-platform: Full access to iTwin Platform APIs
externalDocs:
  description: iTwin Access Control API Documentation
  url: https://developer.bentley.com/apis/access-control/

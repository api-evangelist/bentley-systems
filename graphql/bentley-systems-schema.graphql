"""
Bentley Systems iTwin Platform — Conceptual GraphQL Schema
Covers iModel data management, project administration, access control,
reality data, issues, views, presentation, and platform identity.
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar URL
scalar ECInstanceKey

# ─── Enums ──────────────────────────────────────────────────────────────────

enum ProjectStatus {
  ACTIVE
  INACTIVE
  TRIAL
  DELETED
}

enum ProjectType {
  PROJECT
  ASSET
  PORTFOLIO
  REPOSITORY
  ORGANIZATION
  STANDARD
}

enum ChangeType {
  INSERT
  UPDATE
  DELETE
}

enum ElementType {
  PHYSICAL_ELEMENT
  DRAWING_ELEMENT
  SPATIAL_LOCATION
  INFORMATION_RECORD
  DOCUMENT
  DEFINITION
  LINK
}

enum ModelType {
  PHYSICAL_MODEL
  DRAWING_MODEL
  SPATIAL_LOCATION_MODEL
  DEFINITION_MODEL
  INFORMATION_RECORD_MODEL
  DOCUMENT_LIST_MODEL
}

enum ViewType {
  SPATIAL_VIEW
  DRAWING_VIEW
  SHEET_VIEW
}

enum IssueStatus {
  OPEN
  IN_PROGRESS
  RESOLVED
  CLOSED
  VOID
}

enum IssueType {
  OBSERVATION
  DEFECT
  RFI
  PUNCHLIST
  COORDINATION
  DESIGN_REVIEW
}

enum UserRole {
  OWNER
  ADMINISTRATOR
  PROJECT_ADMINISTRATOR
  CONTRIBUTOR
  VIEWER
  CREATOR
}

# ─── Project / iTwin types ───────────────────────────────────────────────────

type Project {
  id: ID!
  displayName: String!
  number: String
  type: ProjectType!
  status: ProjectStatus!
  details: ProjectDetails
  iModels: [iModel!]
  members: [User!]
  createdDateTime: DateTime!
  lastModifiedDateTime: DateTime
}

type ProjectDetails {
  id: ID!
  displayName: String!
  number: String
  type: ProjectType!
  status: ProjectStatus!
  dataCenterLocation: String
  parentId: ID
  teamId: ID
  _links: JSON
}


# ─── Root types ──────────────────────────────────────────────────────────────

type RootQuery {
  # Project / iTwin
  project(id: ID!): Project
  projects(displayName: String, type: ProjectType, status: ProjectStatus, skip: Int, top: Int): [Project!]!

  # iModel
  iModel(id: ID!): iModel
  iModels(iTwinId: ID!, displayName: String, skip: Int, top: Int): [iModel!]!

  # Changesets
  changeset(iModelId: ID!, changesetId: ID!): Changeset
  changesets(iModelId: ID!, afterIndex: Int, lastSequentialChangesetIndex: Int, skip: Int, top: Int): [Changeset!]!

  # Branches
  branch(iModelId: ID!, branchId: ID!): Branch
  branches(iModelId: ID!, skip: Int, top: Int): [Branch!]!

  # Named Versions / Tags
  namedVersion(iModelId: ID!, namedVersionId: ID!): Tag
  namedVersions(iModelId: ID!, name: String, skip: Int, top: Int): [Tag!]!

  # Checkpoints
  checkpoint(iModelId: ID!, changesetId: ID!): Checkpoint

  # Elements
  element(iModelId: ID!, changesetId: ID, elementId: ID!): Element
  elements(iModelId: ID!, changesetId: ID, classNames: [String!], skip: Int, top: Int): [Element!]!

  # Schemas / Classes / Properties
  schema(iModelId: ID!, changesetId: ID, schemaName: String!): Schema
  schemas(iModelId: ID!, changesetId: ID): [Schema!]!
  class(iModelId: ID!, changesetId: ID, schemaName: String!, className: String!): Class
  property(iModelId: ID!, changesetId: ID, schemaName: String!, className: String!, propertyName: String!): Property

  # ECSQL Queries
  executeQuery(iModelId: ID!, changesetId: ID, ecsql: String!, bindings: JSON, rowFormat: String, continuationToken: String, top: Int): QueryResults!

  # Categories and SubCategories
  categories(iModelId: ID!, changesetId: ID, skip: Int, top: Int): [Category!]!
  category(iModelId: ID!, changesetId: ID, categoryId: ID!): Category

  # Models
  model(iModelId: ID!, changesetId: ID, modelId: ID!): Model
  models(iModelId: ID!, changesetId: ID, classNames: [String!], skip: Int, top: Int): [Model!]!

  # Views
  view(iModelId: ID!, changesetId: ID, viewId: ID!): View
  views(iModelId: ID!, changesetId: ID, skip: Int, top: Int): [View!]!

  # Issues
  issue(iTwinId: ID!, issueId: ID!): Issue
  issues(iTwinId: ID!, type: IssueType, status: IssueStatus, assigneeId: ID, skip: Int, top: Int): [Issue!]!

  # Users
  user(userId: ID!): User
  users(skip: Int, top: Int): [User!]!

  # RBAC
  iTwinRoles(iTwinId: ID!): RBAC!
  iTwinMembers(iTwinId: ID!, roleId: ID): [User!]!

  # Webhooks
  webhook(webhookId: ID!): Webhook
  webhooks(iTwinId: ID, iModelId: ID, skip: Int, top: Int): [Webhook!]!
}

type Mutation {
  # Projects
  createProject(displayName: String!, number: String, type: ProjectType, description: String): Project!
  updateProject(id: ID!, displayName: String, number: String, status: ProjectStatus): Project!
  deleteProject(id: ID!): Boolean!

  # iModels
  createIModel(iTwinId: ID!, displayName: String!, name: String!, description: String): iModel!
  updateIModel(id: ID!, displayName: String, description: String): iModel!
  deleteIModel(id: ID!): Boolean!
  cloneIModel(sourceIModelId: ID!, iTwinId: ID!, displayName: String!, name: String!): iModel!

  # Changesets
  pushChangeset(iModelId: ID!, description: String!, parentId: ID, synchronizationInfo: JSON): Changeset!

  # Named Versions / Tags
  createNamedVersion(iModelId: ID!, displayName: String!, changesetId: ID!, description: String): Tag!
  updateNamedVersion(iModelId: ID!, namedVersionId: ID!, displayName: String, description: String): Tag!

  # Briefcases
  acquireBriefcase(iModelId: ID!, deviceName: String): ElementBriefcase!
  releaseBriefcase(iModelId: ID!, briefcaseId: Int!): Boolean!

  # Issues
  createIssue(iTwinId: ID!, displayName: String!, type: IssueType!, subject: String, description: String, assigneeId: ID): Issue!
  updateIssue(iTwinId: ID!, issueId: ID!, status: IssueStatus, assigneeId: ID, description: String): Issue!
  deleteIssue(iTwinId: ID!, issueId: ID!): Boolean!

  # Webhooks
  createWebhook(callbackUrl: URL!, scope: String!, events: [String!]!, iTwinId: ID, iModelId: ID, displayName: String, secret: String): Webhook!
  updateWebhook(webhookId: ID!, callbackUrl: URL, events: [String!], active: Boolean): Webhook!
  deleteWebhook(webhookId: ID!): Boolean!
}

schema {
  query: RootQuery
  mutation: Mutation
}

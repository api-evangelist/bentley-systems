naftiko: 1.0.0-alpha2
info:
  label: "iTwin Access Control API \u2014 Permissions"
  description: "iTwin Access Control API \u2014 Permissions. Self-contained Naftiko capability covering the Permissions resource\
    \ of the iTwin Access Control API."
  tags:
  - Bentley
  - iTwin
  - Permissions
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    ITWIN_ACCESS_TOKEN: ITWIN_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: access-control-permissions
    baseUri: https://api.bentley.com/accesscontrol
    description: iTwin Access Control API Permissions capability against the iTwin Platform.
    resources:
    - name: permissions
      path: /permissions
      operations:
      - name: listPermissions
        method: GET
        description: List Permissions via iTwin Access Control API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: createPermission
        method: POST
        description: Create Permission via iTwin Access Control API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).

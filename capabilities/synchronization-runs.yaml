naftiko: 1.0.0-alpha2
info:
  label: "iTwin Synchronization API \u2014 Runs"
  description: "iTwin Synchronization API \u2014 Runs. Self-contained Naftiko capability covering the Runs resource of the\
    \ iTwin Synchronization API."
  tags:
  - Bentley
  - iTwin
  - Runs
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    ITWIN_ACCESS_TOKEN: ITWIN_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: synchronization-runs
    baseUri: https://api.bentley.com/synchronization
    description: iTwin Synchronization API Runs capability against the iTwin Platform.
    resources:
    - name: runs
      path: /runs
      operations:
      - name: listRuns
        method: GET
        description: List Runs via iTwin Synchronization API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: createRun
        method: POST
        description: Create Run via iTwin Synchronization API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
